<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RH - Echos De chez Moi</title>

    <script>
        // Charger le manifest PWA uniquement si l'application est servie via un serveur HTTP/HTTPS (évite l'erreur CORS en local sans serveur)
        if (window.location.protocol !== 'file:') {
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = 'manifest.json';
            document.head.appendChild(link);
        }
    </script>
    <script src="libs/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#14522D',
                            dark: '#14522D',
                            yellow: '#f59e0b',
                            red: '#ef4444',
                            light: '#f3f4f6',
                        }
                    },
                    animation: {
                        'page-turn': 'pageTurn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards',
                    },
                    keyframes: {
                        pageTurn: {
                            '0%': {
                                opacity: '0',
                                transform: 'rotateY(-20deg) scale(0.95)',
                                'transform-origin': 'left center'
                            },
                            '100%': {
                                opacity: '1',
                                transform: 'rotateY(0) scale(1)',
                                'transform-origin': 'left center'
                            },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">

    <script src="libs/vue.global.js"></script>

    <style>
        /* Empêche l'affichage des templates moustache avant que Vue ne prenne le contrôle */
        [v-cloak] {
            display: none !important;
        }

        /* Variables et bases */

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            /* --- Material 3 Color System (Light) --- */
            --md-sys-color-primary: #14522d;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d2e8d4;
            --md-sys-color-on-primary-container: #04210a;

            --md-sys-color-secondary: #52634f;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #d5e8cf;
            --md-sys-color-on-secondary-container: #101f10;

            --md-sys-color-tertiary: #38656a;
            --md-sys-color-on-tertiary: #ffffff;
            --md-sys-color-tertiary-container: #bcebf1;
            --md-sys-color-on-tertiary-container: #002023;

            --md-sys-color-error: #ba1a1a;
            --md-sys-color-on-error: #ffffff;
            --md-sys-color-error-container: #ffdad6;
            --md-sys-color-on-error-container: #410002;

            --md-sys-color-background: #fdfdf5;
            --md-sys-color-on-background: #1a1c19;
            --md-sys-color-surface: #fdfdf5;
            --md-sys-color-on-surface: #1a1c19;

            --md-sys-color-surface-variant: #dee5d9;
            --md-sys-color-on-surface-variant: #424940;
            --md-sys-color-outline: #72796f;
            --md-sys-color-outline-variant: #c2c9bd;

            --md-sys-color-surface-container-lowest: #ffffff;
            --md-sys-color-surface-container-low: #f7fbf2;
            --md-sys-color-surface-container: #f1f5ec;
            --md-sys-color-surface-container-high: #ebefe6;
            --md-sys-color-surface-container-highest: #e5e9e1;

            /* --- Shapes --- */
            --md-sys-shape-corner-extra-small: 4px;
            --md-sys-shape-corner-small: 8px;
            --md-sys-shape-corner-medium: 12px;
            --md-sys-shape-corner-large: 16px;
            --md-sys-shape-corner-extra-large: 28px;
            --md-sys-shape-corner-full: 9999px;

            /* --- Elevation (Shadows) --- */
            --md-sys-elevation-0: none;
            --md-sys-elevation-1: 0px 1px 2px 0px rgba(0, 0, 0, 0.3), 0px 1px 3px 1px rgba(0, 0, 0, 0.15);
            --md-sys-elevation-2: 0px 1px 2px 0px rgba(0, 0, 0, 0.3), 0px 2px 6px 2px rgba(0, 0, 0, 0.15);
            --md-sys-elevation-3: 0px 1px 3px 0px rgba(0, 0, 0, 0.3), 0px 4px 8px 3px rgba(0, 0, 0, 0.15);
            --md-sys-elevation-4: 0px 2px 3px 0px rgba(0, 0, 0, 0.3), 0px 6px 10px 4px rgba(0, 0, 0, 0.15);
            --md-sys-elevation-5: 0px 4px 4px 0px rgba(0, 0, 0, 0.3), 0px 8px 12px 6px rgba(0, 0, 0, 0.15);

            /* Legacy mappings to prevent immediate breakage */
            --brand-green: var(--md-sys-color-primary);
            --brand-dark: var(--md-sys-color-on-primary-container);
            --bg-light: var(--md-sys-color-background);
            --text-light: var(--md-sys-color-on-background);
            --brand-yellow: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            transition: background-color 0.3s, color 0.3s;
        }

        .dark {
            /* --- Material 3 Color System (Dark) --- */
            --md-sys-color-primary: #9cd6a6;
            --md-sys-color-on-primary: #003916;
            --md-sys-color-primary-container: #005322;
            --md-sys-color-on-primary-container: #b8f2c0;

            --md-sys-color-secondary: #b9ccb3;
            --md-sys-color-on-secondary: #253423;
            --md-sys-color-secondary-container: #3b4b38;
            --md-sys-color-on-secondary-container: #d5e8cf;

            --md-sys-color-tertiary: #a0cfd5;
            --md-sys-color-on-tertiary: #00363b;
            --md-sys-color-tertiary-container: #1e4d52;
            --md-sys-color-on-tertiary-container: #bcebf1;

            --md-sys-color-error: #ffb4ab;
            --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000a;
            --md-sys-color-on-error-container: #ffdad6;

            --md-sys-color-background: #1a1c19;
            --md-sys-color-on-background: #e2e3dd;
            --md-sys-color-surface: #1a1c19;
            --md-sys-color-on-surface: #e2e3dd;

            --md-sys-color-surface-variant: #424940;
            --md-sys-color-on-surface-variant: #c2c9bd;
            --md-sys-color-outline: #8c9388;
            --md-sys-color-outline-variant: #424940;

            --md-sys-color-surface-container-lowest: #0c0f0c;
            --md-sys-color-surface-container-low: #1a1c19;
            --md-sys-color-surface-container: #1e201d;
            --md-sys-color-surface-container-high: #282b27;
            --md-sys-color-surface-container-highest: #333632;
        }

        .dark body {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
        }

        /* --- Shake Animation for Errors --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .animate-shake {
            animation: shake 0.15s ease-in-out 0s 2;
        }

        /* --- Material 3 Utility Classes --- */

        /* Surfaces */
        .m3-surface {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
        }

        .m3-surface-container {
            background-color: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-on-surface);
        }

        .m3-surface-container-high {
            background-color: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
        }

        .m3-primary-container {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        .m3-surface-container-low {
            background-color: var(--md-sys-color-surface-container-low);
            color: var(--md-sys-color-on-surface);
        }

        .m3-surface-container-lowest {
            background-color: var(--md-sys-color-surface-container-lowest);
            color: var(--md-sys-color-on-surface);
        }

        .m3-surface-container-highest {
            background-color: var(--md-sys-color-surface-container-highest);
            color: var(--md-sys-color-on-surface);
        }

        /* Text */
        .m3-text-on-surface {
            color: var(--md-sys-color-on-surface);
        }

        .m3-text-on-surface-variant {
            color: var(--md-sys-color-on-surface-variant);
        }

        .m3-text-primary {
            color: var(--md-sys-color-primary);
        }

        /* Cards */
        .m3-card {
            background-color: var(--md-sys-color-surface-container-lowest);
            border-radius: var(--md-sys-shape-corner-medium);
            box-shadow: var(--md-sys-elevation-1);
            border: 1px solid var(--md-sys-color-outline-variant);
            padding: 1rem;
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .dark .m3-card {
            background-color: var(--md-sys-color-surface-container-low);
        }

        .m3-card:hover {
            box-shadow: var(--md-sys-elevation-2);
        }

        .m3-card.interactive:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: var(--md-sys-elevation-3);
            border-color: var(--md-sys-color-primary);
            cursor: pointer;
        }

        /* Buttons (M3 Extended FAB / Filled Button style) */
        .m3-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            padding: 0 24px;
            border-radius: var(--md-sys-shape-corner-full);
            font-weight: 500;
            font-size: 0.875rem;
            letter-spacing: 0.1px;
            transition: all 0.2s ease;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .m3-btn-primary {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            box-shadow: var(--md-sys-elevation-1);
        }

        .m3-btn-primary:hover {
            box-shadow: var(--md-sys-elevation-2);
            opacity: 0.92;
        }

        .m3-btn-tonal {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }

        .m3-btn-tonal:hover {
            box-shadow: var(--md-sys-elevation-1);
            opacity: 0.92;
        }

        .m3-btn-outlined {
            background: transparent;
            border: 1px solid var(--md-sys-color-outline);
            color: var(--md-sys-color-primary);
        }

        .m3-btn-outlined:hover {
            background-color: var(--md-sys-color-surface-variant);
        }

        .m3-btn-text {
            background-color: transparent;
            color: var(--md-sys-color-primary);
        }

        .m3-btn-text:hover {
            background-color: var(--md-sys-color-surface-variant);
        }

        /* Inputs (Outlined) */
        .m3-input {
            background-color: transparent;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--md-sys-shape-corner-small);
            color: var(--md-sys-color-on-surface);
            padding: 8px 12px;
            height: 40px;
            transition: all 0.2s;
            width: 100%;
        }

        .m3-input:focus {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 1px var(--md-sys-color-primary);
            outline: none;
        }

        .dark .m3-input {
            border-color: var(--md-sys-color-outline-variant);
        }

        /* Selects (Outlined) */
        .m3-select {
            appearance: none;
            background-color: transparent;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--md-sys-shape-corner-small);
            color: var(--md-sys-color-on-surface);
            padding: 8px 36px 8px 12px;
            height: 40px;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            transition: all 0.2s;
            cursor: pointer;
            width: 100%;
        }

        .m3-select:focus {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 1px var(--md-sys-color-primary);
            outline: none;
        }

        .dark .m3-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            border-color: var(--md-sys-color-outline-variant);
        }

        /* Tables (M3) */
        .m3-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .m3-table thead th {
            background-color: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
            text-align: left;
            padding: 12px 16px;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .dark .m3-table thead th {
            background-color: var(--md-sys-color-surface-container-high);
        }

        .m3-table tbody tr {
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            transition: background-color 0.2s;
        }

        .m3-table tbody tr:hover {
            background-color: var(--md-sys-color-surface-container-highest);
        }

        .m3-table td {
            padding: 12px 16px;
            color: var(--md-sys-color-on-surface);
            vertical-align: middle;
        }

        /* Icon Buttons */
        .m3-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--md-sys-color-on-surface-variant);
            transition: all 0.2s;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .m3-icon-btn:hover {
            background-color: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-on-surface);
        }

        /* Scrollbars */
        .custom-scroll::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--md-sys-color-outline);
            border-radius: 4px;
        }

        /* KEEPING SPECIFIC HELPERS */
        .fade-enter-active,
        .fade-leave-active {
            transition: opacity 0.2s;
        }

        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
        }

        .today-cell {
            background-color: var(--md-sys-color-tertiary-container) !important;
            color: var(--md-sys-color-on-tertiary-container) !important;
            font-weight: 700 !important;
        }

        /* Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Sidebar & Transitions */
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out, width 0.3s ease-in-out;
            width: 256px;
            z-index: 45;
        }

        #sidebar.open {
            transform: translateX(0);
        }

        @media (min-width: 1024px) {
            #sidebar {
                position: relative;
                transform: none !important;
                width: 256px;
                /* Removed !important to allow override */
                /* Premium casing: Emphasized/Expressive easing */
                transition: width 0.5s cubic-bezier(0.2, 0.0, 0, 1.0), opacity 0.4s cubic-bezier(0.2, 0.0, 0, 1.0), margin 0.5s cubic-bezier(0.2, 0.0, 0, 1.0);
                white-space: nowrap;
            }

            .sidebar-collapsed #sidebar {
                width: 0;
                overflow: hidden;
                opacity: 0;
                margin-left: -1rem;
                /* Helper to ensure shadow is hidden */
            }

            #mobileSidebarToggle {
                display: none !important;
            }
        }

        /* Cellules Renvoyé / Blocked */
        .cell-renvoye {
            background-color: var(--md-sys-color-surface-container-high) !important;
            background-image: linear-gradient(45deg, var(--md-sys-color-outline-variant) 25%, transparent 25%, transparent 50%, var(--md-sys-color-outline-variant) 50%, var(--md-sys-color-outline-variant) 75%, transparent 75%, transparent);
            background-size: 4px 4px;
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>

<body class="m3-surface transition-colors duration-300 h-screen overflow-hidden">



    <div id="app" v-cloak class="flex h-full">

        <div id="overlay"></div>

        <template v-if="isLoggedIn">

        <button id="mobileSidebarToggle"
            class="fixed top-4 left-4 z-30 lg:hidden bg-brand-green text-white p-3 rounded-full shadow-lg focus:outline-none transition-transform duration-300">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>

        <!-- Removed transition-all and duration-300 to let CSS handle it precisely -->
        <aside id="sidebar"
            class="w-64 m3-surface-container-high flex flex-col shadow-2xl z-[45] border-r border-[var(--md-sys-color-outline-variant)]">
            <div class="p-6 text-center border-b border-[var(--md-sys-color-outline-variant)]">
                <div
                    class="w-full h-24 bg-white rounded-lg flex items-center justify-center overflow-hidden border-2 border-brand-yellow">
                    <img v-if="logoSrc" :src="logoSrc" class="w-full h-full object-contain p-1">
                    <div v-else class="text-gray-400 text-xs flex flex-col items-center">
                        <i class="fa-solid fa-image text-2xl mb-1"></i>
                        <span class="sidebar-text">Logo depuis Stock</span>
                    </div>
                </div>

                <h1 class="text-xl font-bold mt-4 tracking-wide m3-text-primary sidebar-text">{{ companyName || '' }}
                </h1>
                <p class="text-[10px] m3-text-on-surface-variant uppercase tracking-widest mt-1 sidebar-text">Gestion RH
                </p>

                <!-- Indicateur sync Firebase temps réel -->
                <div class="sidebar-text mt-2 flex items-center justify-center gap-1.5 text-[10px] font-semibold">
                    <template v-if="!isOnline">
                        <span class="w-2 h-2 rounded-full bg-gray-400 inline-block"></span>
                        <span class="text-gray-400">Hors ligne</span>
                    </template>
                    <template v-else-if="syncStatus === 'syncing'">
                        <i class="fa-solid fa-rotate fa-spin text-blue-500 text-[10px]"></i>
                        <span class="text-blue-500">Synchronisation…</span>
                    </template>
                    <template v-else-if="syncStatus === 'ok'">
                        <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>
                        <span class="text-green-600">Synchronisé</span>
                    </template>
                    <template v-else-if="syncStatus === 'error'">
                        <span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span>
                        <span class="text-red-500">Erreur sync</span>
                    </template>
                    <template v-else>
                        <span class="w-2 h-2 rounded-full bg-gray-300 inline-block"></span>
                        <span class="text-gray-400">En attente</span>
                    </template>
                </div>
            </div>

            <nav class="flex-1 py-6 space-y-2 px-2">
                <button @click="currentTab = 'dashboard'"
                    :class="{'m3-primary-container m3-text-on-primary-container font-bold': currentTab === 'dashboard', 'm3-text-on-surface-variant hover:bg-[var(--md-sys-color-surface-container-highest)]': currentTab !== 'dashboard'}"
                    class="w-full text-left px-4 py-3 rounded-full flex items-center transition-all duration-200">
                    <i class="fa-solid fa-chart-pie w-8 text-center"></i> <span class="sidebar-text">Tableau de
                        Bord</span>
                </button>
                <button @click="currentTab = 'employes'"
                    :class="{'m3-primary-container m3-text-on-primary-container font-bold': currentTab === 'employes', 'm3-text-on-surface-variant hover:bg-[var(--md-sys-color-surface-container-highest)]': currentTab !== 'employes'}"
                    class="w-full text-left px-4 py-3 rounded-full flex items-center transition-all duration-200">
                    <i class="fa-solid fa-user-tie w-8 text-center"></i> <span class="sidebar-text">Employés</span>
                </button>
                <button @click="currentTab = 'pointage'"
                    :class="{'m3-primary-container m3-text-on-primary-container font-bold': currentTab === 'pointage', 'm3-text-on-surface-variant hover:bg-[var(--md-sys-color-surface-container-highest)]': currentTab !== 'pointage'}"
                    class="w-full text-left px-4 py-3 rounded-full flex items-center transition-all duration-200">
                    <i class="fa-solid fa-calendar-check w-8 text-center"></i> <span
                        class="sidebar-text">Pointage</span>
                </button>
                <button @click="currentTab = 'salaires'"
                    :class="{'m3-primary-container m3-text-on-primary-container font-bold': currentTab === 'salaires', 'm3-text-on-surface-variant hover:bg-[var(--md-sys-color-surface-container-highest)]': currentTab !== 'salaires'}"
                    class="w-full text-left px-4 py-3 rounded-full flex items-center transition-all duration-200">
                    <i class="fa-solid fa-money-bill-wave w-8 text-center"></i> <span
                        class="sidebar-text">Salaires</span>
                </button>
                <a href="stock.html"
                    class="w-full text-left px-4 py-3 rounded-full flex items-center m3-text-on-surface-variant hover:bg-[var(--md-sys-color-surface-container-highest)] transition-all duration-200">
                    <i class="fa-solid fa-boxes w-8 text-center"></i> <span class="sidebar-text">Gestion Stock</span>
                </a>
                <button v-if="currentUser && currentUser.role === 'admin'" @click="currentTab = 'comptes'; loadUsers()"
                    :class="{'m3-primary-container m3-text-on-primary-container font-bold': currentTab === 'comptes', 'm3-text-on-surface-variant hover:bg-[var(--md-sys-color-surface-container-highest)]': currentTab !== 'comptes'}"
                    class="w-full text-left px-4 py-3 rounded-full flex items-center transition-all duration-200">
                    <i class="fa-solid fa-users-gear w-8 text-center"></i> <span class="sidebar-text">Comptes</span>
                </button>
            </nav>

            <div class="p-4 border-t border-[var(--md-sys-color-outline-variant)] space-y-2">

    <script>
        // --- DEXIE DATABASES ---
        // - db (StockExpertDB): Stock data (stock.html only)
        // - rhDb (RH_AppDB): RH data (index.html only) 
        // - sharedDb (SharedSettingsDB): Shared settings (both pages)
        // - localStorage wrapper: Uses sharedDb for parameters

        // Shared keys for settings (synchronized across pages)
        const LOGO_KEY = 'stock_expert_logo';
        const THEME_COLOR_KEY = 'stock_expert_theme_color';
        const COMPANY_KEY = 'stock_expert_company';
        const GLASS_ENABLED_KEY = 'stock_expert_glass_enabled';
        const BACKUP_SCHEDULE_KEY = 'stock_expert_backup_schedule_v1';
        const THEME_KEY = 'stock_expert_theme';

        // RH Data key (stored in rhDb, not synchronized)
        const RH_APP_DATA_KEY = 'rh_app_data';

        // Wrappers for shared parameters via localStorage (backed by sharedDb/Dexie appSettings)
        async function dbSetItem(key, value) {
            localStorage.setItem(key, value);
            try {
                if (typeof db !== 'undefined' && db.appSettings) {
                    await db.appSettings.put({ key, value, timestamp: Date.now() });
                }
            } catch (err) {
                console.warn('dbSetItem Dexie error:', err);
            }
        }
        async function dbGetItem(key) {
            let val = localStorage.getItem(key);
            if (!val) {
                try {
                    if (typeof db !== 'undefined' && db.appSettings) {
                        const item = await db.appSettings.get(key);
                        if (item) {
                            val = item.value;
                            localStorage.setItem(key, val);
                        }
                    }
                } catch (err) {
                    console.warn('dbGetItem Dexie error:', err);
                }
            }
            return val;
        }
        function dbRemoveItem(key) {
            localStorage.removeItem(key);
            try {
                if (typeof db !== 'undefined' && db.appSettings) {
                    db.appSettings.delete(key);
                }
            } catch (err) {
                console.warn('dbRemoveItem Dexie error:', err);
            }
        }
        function dbClear() {
            localStorage.clear();
            try {
                if (typeof db !== 'undefined' && db.appSettings) {
                    db.appSettings.clear();
                }
            } catch (err) {
                console.warn('dbClear Dexie error:', err);
            }
        }

        // Wrappers for RH data (stored in rhDb, NOT synchronized)
        async function rhDbSetItem(key, value) {
            try {
                // Use unified DB RH wrapper
                await dbRhData.put({ key, value });
            } catch (err) {
                console.error('rhDb setItem error:', err);
            }
        }
        async function rhDbGetItem(key) {
            try {
                const item = await dbRhData.get(key);
                return item ? item.value : null;
            } catch (err) {
                console.error('rhDb getItem error:', err);
                return null;
            }
        }

        // Migration: Copier les anciennes données RH du localStorage natif vers rhDb
        async function migrateRHDataToRhDb() {
            try {
                console.log('🔄 Vérification migration données RH anciennes versions...');

                // Vérifier si la table RH est vide dans la base unifiée
                const existingCount = await db.rhAppData.count();
                if (existingCount > 0) {
                    console.log('✓ RH_AppDB contient déjà des données, pas de migration');
                    return;
                }

                // Chercher les anciennes données RH dans le vrai localStorage
                const nativeRHData = nativeLocalStorage.getItem(RH_APP_DATA_KEY);
                if (!nativeRHData) {
                    console.log('ℹ️ Aucune donnée RH ancienne trouvée');
                    return;
                }

                // Migrer vers rhDb
                await rhDbSetItem(RH_APP_DATA_KEY, nativeRHData);
                console.log('✅ Données RH migrées avec succès!');

            } catch (err) {
                console.error('âŒ Erreur migration RH:', err);
            }
        }

            title: 'Gérer les employés',
            content: 'Dans l\'onglet "Effectifs", cliquez sur + pour ajouter un employé, ou cliquez sur un profil pour modifier/supprimer.'
        }, {
            title: 'Pointage',

        }, {
            title: 'Sauvegarde',
            content: 'La sauvegarde automatique est configurée dans les paramètres â€” vous pouvez exporter et restaurer l\'état.'
        }, {
            title: 'Fin',

        }];

        let _tutorialIndex = 0;

        function renderTutorialIndex() {
            const t = tutorialStepsIndex[_tutorialIndex];

            document.getElementById('tutorialNextIndex').innerText = _tutorialIndex === tutorialStepsIndex.length - 1 ? 'Terminer' : 'Suivant';
        }

        function startTutorialIndex() {
            _tutorialIndex = 0;
            renderTutorialIndex();
            document.getElementById('tutorialModalIndex').classList.remove('hidden');
        }

        function closeTutorialIndex() {
            document.getElementById('tutorialModalIndex').classList.add('hidden');

                _tutorialIndex++;
                renderTutorialIndex();

        const {

            watch,

        } = Vue;

        createApp({
            setup() {
                // Configuration
                const sites = ref(['Douala', 'Kribi', 'Sikoum', 'Yaoundé', 'Bafoussam']);
                const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];

                // Ã‰tat
                const currentTab = ref('dashboard');
                const employees = ref([]); // Vide par défaut
                const attendance = ref({});
                const payrollExtras = ref({});
                const logoSrc = ref(null); // Logo de l'entreprise
                // Read company settings from localStorage; the value may be a JSON string
                const parseCompanyName = (raw) => {
                    if (!raw) return '';
                    try {
                        const j = JSON.parse(raw);
                        if (j && typeof j === 'object' && j.name) return j.name;
                    } catch (e) {
                        // not JSON, fall through
                    }
                    return String(raw || '');
                };
                const companyName = ref('');
                // Load company name from Dexie
                dbGetItem('stock_expert_company').then(raw => {
                    companyName.value = parseCompanyName(raw) || '';
                }).catch(err => console.error('Dexie error:', err));
                const stockItems = ref([]); // Produits stock
                const visibleSundays = ref([]);

                // Ã‰tat pour import
                const importTargetSite = ref('');

                // Refs pour les inputs fichiers (Crucial pour le fonctionnement)
                const importInput = ref(null);
                const backupInput = ref(null);

                // --- Export PDF configurable ---
                const showExportModal = ref(false);
                const exportColumns = ref([
                    { key: 'nomComplet', label: 'Nom & Prénom', checked: true },
                    { key: 'type', label: 'Type (CDI/Temp)', checked: true },
                    { key: 'statut', label: 'Statut', checked: true },
                    { key: 'site', label: 'Site', checked: true },
                    { key: 'contact', label: 'Contact', checked: true },
                    { key: 'salaire', label: 'Salaire', checked: true }
                ]);
                const customColumns = ref([]);
                const newCustomColumnName = ref('');
                const addCustomColumn = () => {
                    const name = newCustomColumnName.value.trim();
                    if (name) {
                        customColumns.value.push({ label: name });

                    }
                };
                const removeCustomColumn = (index) => {
                    customColumns.value.splice(index, 1);
                };
                const openExportModal = () => { showExportModal.value = true; };
                const closeExportModal = () => { showExportModal.value = false; };

                // Chargement persistant (conteneur pour les données restaurées)
                let savedData = null;

                const filters = ref({
                    site: '',
                    employeeType: 'all', // 'all', 'permanent', 'temporaire'
                    month: new Date().getMonth(),
                    year: new Date().getFullYear()
                });

                // Override date for pointage (for testing/reporting)
                // Format: 'YYYY-MM-DD' or null to use current date
                const overrideDate = ref(null);

                // Modal & Toast
                const modalMode = ref('create');
                const showModal = ref(false);
                const form = ref({
                    id: null,
                    type: 'permanent', // Default value
                    nom: '',
                    prenom: '',
                    site: '',
                    salaireBase: 0,
                    contact: '',
                    statut: 'actif', // Nouveau champ
                    dateRenvoi: null, // Nouveau champ
                    dateEmbauche: null // NOUVEAU CHAMP DATE D'EMBAUCHE
                });
                const toast = ref({
                    show: false,
                    message: ''
                });

                // --- NOUVEAU: ETAT HISTORIQUE ---
                const showHistoryModal = ref(false);
                const currentHistoryEmp = ref(null);
                const historyItems = ref([]);

                // --- CHART.JS REFS ---
                const pieChartEl = ref(null);
                const barChartEl = ref(null);
                const tempChartEl = ref(null); // NOUVEAU
                let pieChartInstance = null;
                let barChartInstance = null;
                let tempChartInstance = null; // NOUVEAU

                // --- HELPERS ---
                const showToast = (msg) => {
                    toast.value = {
                        show: true,
                        message: msg
                    };
                    setTimeout(() => toast.value.show = false, 3000);
                };

                const formatMoney = (amount) => {
                    let val = new Intl.NumberFormat('fr-CM').format(Math.round(amount));
                    return val.replace(/[\u00A0\u202F]/g, ' ') + ' FCFA';
                };

                // --- GESTION DU LOGO ---
                // (Constants already defined at top: LOGO_KEY, THEME_KEY, COMPANY_KEY, etc.)
                // Backup scheduler keys (shared with stock.html) - already defined
                const LAST_BACKUP_KEY = 'stock_expert_last_backup_v1';
                const BACKUP_LOCK_KEY = 'stock_expert_backup_lock_v1';

                const initTheme = () => {
                    const themeVal = localStorage.getItem(THEME_KEY);
                    if (themeVal === 'dark') document.documentElement.classList.add('dark');
                };

                const toggleTheme = (event) => {
                    if (!document.startViewTransition || !event) {
                        document.documentElement.classList.toggle('dark');
                        const isDark = document.documentElement.classList.contains('dark');
                        localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
                        showToast(isDark ? 'Mode sombre activé' : 'Mode clair activé');
                        return;
                    }
                    const x = event.clientX;
                    const y = event.clientY;
                    const endRadius = Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y));
                    const transition = document.startViewTransition(() => {
                        document.documentElement.classList.toggle('dark');
                        const isDark = document.documentElement.classList.contains('dark');
                        dbSetItem(THEME_KEY, isDark ? 'dark' : 'light').catch(err => console.error('Dexie error:', err));
                    });
                    transition.ready.then(() => {
                        const clipPath = [`circle(0px at ${x}px ${y}px)`, `circle(${endRadius}px at ${x}px ${y}px)`];
                        document.documentElement.animate({
                            clipPath: clipPath
                        }, {
                            duration: 500,
                            easing: 'ease-in',
                            pseudoElement: '::view-transition-new(root)',
                        });
                    });
                };

                // --- COMPUTED ---
                const filteredEmployees = computed(() => {
                    return employees.value.filter(e => {
                        // 1. Filtrer par site
                        const matchSite = !filters.value.site || e.site === filters.value.site;

                        // 2. Filtrer par type (permanent vs temporaire)
                        const empType = e.type || 'permanent';
                        const matchType = filters.value.employeeType === 'all' || empType === filters.value.employeeType;

                        return matchSite && matchType;
                    });
                });

                // NOUVEAU : Calculer les employés visibles pour le POINTAGE spécifiquement
                // Exclut les renvoyés si le mois actuel > mois de renvoi
                // Exclut les nouveaux si le mois actuel < mois d'embauche
                const employeesVisibleInPointage = computed(() => {
                    const currentMonthStart = new Date(filters.value.year, filters.value.month, 1);
                    const currentMonthEnd = new Date(filters.value.year, filters.value.month + 1, 0); // Dernier jour du mois

                    return filteredEmployees.value.filter(e => {
                        // Logique renvoi : Si renvoyé avant le début de ce mois -> Masqué
                        if (e.statut === 'renvoye' && e.dateRenvoi) {
                            const dismissalDate = new Date(e.dateRenvoi);
                            if (dismissalDate < currentMonthStart) {
                                return false;
                            }
                        }

                        // Logique Embauche : Si embauché APRES la fin de ce mois -> Masqué
                        if (e.dateEmbauche) {
                            const startDate = new Date(e.dateEmbauche);
                            // On compare la date d'embauche avec la fin du mois.
                            // Si date embauche > fin du mois, il n'a pas encore commencé.
                            if (startDate > currentMonthEnd) {
                                return false;
                            }
                        }

                        return true;
                    });
                });

                // NOUVEAU : Employés filtrés pour l'affichage (Salaires + Employés)
                // Exclut les renvoyés à partir du mois SUIVANT leur renvoi
                const filteredEmployeesForDisplay = computed(() => {
                    const currentMonthStart = new Date(filters.value.year, filters.value.month, 1);

                    return filteredEmployees.value.filter(e => {
                        // Si renvoyé et sa date de renvoi est avant le début du mois courant
                        // -> Exclure (ne pas afficher à partir du mois suivant)
                        if (e.statut === 'renvoye' && e.dateRenvoi) {
                            const dismissalDate = new Date(e.dateRenvoi);
                            // Réinitialiser l'heure pour comparaison correcte de date
                            dismissalDate.setHours(0, 0, 0, 0);
                            const monthStartCopy = new Date(currentMonthStart);
                            monthStartCopy.setHours(0, 0, 0, 0);

                            // Si renvoi avant le début du mois courant, exclure
                            if (dismissalDate < monthStartCopy) {
                                return false;
                            }
                        }
                        return true;
                    }).sort((a, b) => {
                        // Tri par site (alphabétique), puis par nom (alphabétique)
                        const siteCompare = (a.site || '').localeCompare(b.site || '', 'fr');
                        if (siteCompare !== 0) return siteCompare;
                        return (`${a.nom} ${a.prenom}`).localeCompare(`${b.nom} ${b.prenom}`, 'fr');
                    });
                });

                // Limiteur d'affichage pour améliorer les performances du tableau de pointage
                // Limiteur d'affichage removed as per user request to remove "Load More" button
                // Showing all filtered employees directly
                const limitedEmployees = computed(() => employeesVisibleInPointage.value);


                const daysInMonth = computed(() => new Date(filters.value.year, filters.value.month + 1, 0).getDate());

                // Liste des jours incluant Lun-Sam + les dimanches activés individuellement
                const workDays = computed(() => {
                    const days = [];
                    for (let d = 1; d <= daysInMonth.value; d++) {
                        const date = new Date(filters.value.year, filters.value.month, d);
                        const isSun = date.getDay() === 0;

                        // Si ce n'est pas un dimanche, ou si c'est un dimanche présent dans la liste visible
                        if (!isSun || visibleSundays.value.includes(d)) {
                            days.push(d);
                        }
                    }
                    return days;
                });

                // Helpers pour le bouton "+"
                const isNextSundayVisible = (saturdayDay) => {
                    const sunday = saturdayDay + 1;
                    return visibleSundays.value.includes(sunday);
                };

                const toggleNextSunday = (saturdayDay) => {
                    const sunday = saturdayDay + 1;
                    if (sunday > daysInMonth.value) return; // Fin de mois

                    if (visibleSundays.value.includes(sunday)) {
                        visibleSundays.value = visibleSundays.value.filter(d => d !== sunday);
                    } else {
                        visibleSundays.value.push(sunday);

                        // Initialisation pour ce dimanche
                        const year = filters.value.year;
                        const month = filters.value.month;

                        employees.value.forEach(emp => {
                            const key = `${emp.id}_${year}-${month}-${sunday}`;
                            // Si aucune donnée n'existe, on met Absent Justifié (3) par défaut pour les dimanches
                            if (attendance.value[key] === undefined) {
                                attendance.value[key] = 3; // MODIFICATION: 3 (Justifié) au lieu de 2 (Absent)
                            }
                        });
                    }
                };

                // OPTIMIZATION: Pre-calculate date objects for the current month
                // This avoids creating new Date() objects for every cell check (30 * 50 = 1500 allocs)
                const monthDatesMap = computed(() => {
                    const map = {}; // 1..31 -> Date object
                    const y = filters.value.year;
                    const m = filters.value.month;
                    const days = daysInMonth.value;
                    for (let d = 1; d <= days; d++) {
                        const date = new Date(y, m, d);
                        date.setHours(0, 0, 0, 0);
                        map[d] = date;
                    }
                    return map;
                });

                // OPTIMIZATION: Cache employee dates (timestamp) to avoid parsing strings 1500 times
                // Storing as timestamp (number) makes comparison faster too
                const employeeDateCache = computed(() => {
                    const cache = {};
                    employees.value.forEach(emp => {
                        const data = { renvoi: null, embauche: null };
                        if (emp.dateRenvoi) {
                            const d = new Date(emp.dateRenvoi);
                            d.setHours(0, 0, 0, 0);
                            data.renvoi = d.getTime();
                        }
                        if (emp.dateEmbauche) {
                            const d = new Date(emp.dateEmbauche);
                            d.setHours(0, 0, 0, 0);
                            data.embauche = d.getTime();
                        }
                        cache[emp.id] = data;
                    });
                    return cache;
                });

                // Helper pour vérifier si la date est après le renvoi
                // OPTIMIZATED: Uses pre-calculated day date and pre-parsed employee timestamps
                const isDismissed = (emp, day) => {
                    if (emp.statut !== 'renvoye' || !emp.dateRenvoi) return false;

                    const currentDate = monthDatesMap.value[day]; // Date object
                    if (!currentDate) return false;

                    const cache = employeeDateCache.value[emp.id];
                    if (!cache || !cache.renvoi) return false;

                    return currentDate.getTime() > cache.renvoi;
                };

                // NOUVEAU HELPER : Vérifier si la date est AVANT l'embauche
                // OPTIMIZED
                const isBeforeStart = (emp, day) => {
                    if (!emp.dateEmbauche) return false;

                    const currentDate = monthDatesMap.value[day];
                    if (!currentDate) return false;

                    const cache = employeeDateCache.value[emp.id];
                    if (!cache || !cache.embauche) return false;

                    return currentDate.getTime() < cache.embauche;
                };


                // --- LOGIQUE DE STATUT PAR DEFAUT CENTRALISEE ---
                // OPTIMIZED: remove find()
                const resolveStatus = (emp, day) => {
                    if (!emp) return 1;
                    const key = `${emp.id}_${filters.value.year}-${filters.value.month}-${day}`;
                    const val = attendance.value[key];
                    if (val !== undefined) return val;

                    // Si pas de valeur, on check le type employé
                    if (emp.type === 'temporaire') {
                        return 3; // Par défaut Justifié (Jaune) pour les temporaires
                    }
                    return 1; // Par défaut Présent (Vert) pour les autres
                };

                // Calculs de paie
                const payrollData = computed(() => {
                    const y = filters.value.year;
                    const m = filters.value.month;
                    const keyMonth = `${y}-${m}`;

                    return filteredEmployeesForDisplay.value.map(emp => {
                        const extrasKey = `${emp.id}_${keyMonth}`;
                        if (!payrollExtras.value[extrasKey]) {
                            payrollExtras.value[extrasKey] = {
                                prime: 0,
                                dette: 0,
                                retenue: 0
                            };
                        }
                        const extras = payrollExtras.value[extrasKey];

                        let absentCount = 0;
                        for (let d = 1; d <= daysInMonth.value; d++) {
                            const dateObj = new Date(y, m, d);
                            const isSunday = dateObj.getDay() === 0;

                            // LOGIQUE RENVOI : Si on est après la date de renvoi, on arrête de compter
                            if (emp.statut === 'renvoye' && emp.dateRenvoi) {
                                const dismissalDate = new Date(emp.dateRenvoi);
                                dismissalDate.setHours(0, 0, 0, 0);
                                dateObj.setHours(0, 0, 0, 0);
                                if (dateObj > dismissalDate) continue; // On ignore ce jour
                            }

                            // LOGIQUE EMBAUCHE : Si on est avant la date d'embauche, on ignore ce jour (ne compte pas comme absence)
                            if (emp.dateEmbauche) {
                                const startDate = new Date(emp.dateEmbauche);
                                startDate.setHours(0, 0, 0, 0);
                                dateObj.setHours(0, 0, 0, 0);
                                if (dateObj < startDate) continue;
                            }

                            // Utilisation de la logique par défaut
                            // NOTE: payroll computation is separate from render loop, so we can keep using emp object here.
                            // However, we need to pass 'emp' now.
                            let status = resolveStatus(emp, d);

                            if (status === 2) {
                                // Les absences du dimanche ne comptent PAS, qu'il soit affiché ou non
                                if (!isSunday) {
                                    absentCount++;
                                }
                            }
                        }

                        // Ajustement jours ouvrables pour les temporaires si besoin (ici on garde 22 standard)
                        const joursOuvrables = 22;
                        const retenueAbsence = Math.round((emp.salaireBase / joursOuvrables) * absentCount);
                        const net = Math.round(emp.salaireBase + (extras.prime || 0) - (extras.dette || 0) - (extras.retenue || 0) - retenueAbsence);

                        return {
                            emp,
                            salaireBase: emp.salaireBase,
                            absentDays: absentCount,
                            retenueAbsence: retenueAbsence,
                            extras,
                            net
                        };
                    });
                });

                const totals = computed(() => {
                    return payrollData.value.reduce((acc, curr) => ({
                        base: acc.base + curr.salaireBase,
                        retenue: acc.retenue + (curr.extras.retenue || 0) + curr.retenueAbsence,
                        primes: acc.primes + (curr.extras.prime || 0),
                        dettes: acc.dettes + (curr.extras.dette || 0),
                        net: acc.net + curr.net
                    }), {
                        base: 0,
                        retenue: 0,
                        primes: 0,
                        dettes: 0,
                        net: 0
                    });
                });

                // --- KPI DATA COMPUTED ---
                const kpiData = computed(() => {
                    const totalEmployees = filteredEmployees.value.length;
                    // On compte les actifs (pas renvoyés)
                    const activeEmployees = filteredEmployees.value.filter(e => e.statut !== 'renvoye').length;
                    const totalPayroll = totals.value.net;

                    // Taux de présence AUJOURD'HUI (ou date override)
                    const current = getCurrentDate();
                    const day = current.getDate();
                    const month = current.getMonth();
                    const year = current.getFullYear();

                    let presentCount = 0;
                    if (activeEmployees > 0) {
                        filteredEmployees.value.forEach(emp => {
                            if (emp.statut === 'renvoye') return; // On ignore les renvoyés pour la présence du jour
                            // Ignore si pas encore embauché ce jour là
                            if (emp.dateEmbauche) {
                                const start = new Date(emp.dateEmbauche);
                                start.setHours(0, 0, 0, 0);
                                const currCheck = new Date(current);
                                currCheck.setHours(0, 0, 0, 0);
                                if (currCheck < start) return;
                            }

                            const key = `${emp.id}_${year}-${month}-${day}`;
                            let status = attendance.value[key];
                            // Default logic applied here too
                            if (status === undefined) {
                                status = resolveStatus(emp, day);
                            }

                            if (!status || status === 1 || status === 3) {
                                presentCount++;
                            }
                        });
                    }

                    const attendanceRate = activeEmployees > 0 ? Math.round((presentCount / activeEmployees) * 100) : 0;

                    return {
                        totalEmployees,
                        activeEmployees,
                        totalPayroll,
                        presentCount,
                        attendanceRate
                    };
                });

                // --- CHARTS LOGIC ---
                const updateCharts = () => {
                    if (currentTab.value !== 'dashboard') return;

                    const dataset = filteredEmployees.value;
                    const siteStats = {};

                    // Stats pour le camembert Sites et Barres Salaires
                    dataset.forEach(emp => {
                        if (!siteStats[emp.site]) {
                            siteStats[emp.site] = {
                                count: 0,
                                salaryCost: 0
                            };
                        }
                        if (emp.statut !== 'renvoye') {
                            siteStats[emp.site].count++;
                        }
                        const payrollEntry = payrollData.value.find(p => p.emp.id === emp.id);
                        if (payrollEntry) {
                            siteStats[emp.site].salaryCost += payrollEntry.net;
                        }
                    });

                    // NOUVEAU : Calcul pour le graphique TEMPORAIRES (Taux d'activité)
                    const year = filters.value.year;
                    const month = filters.value.month;
                    const daysInM = new Date(year, month + 1, 0).getDate();

                    let tempTotal = 0;
                    let tempActive = 0;

                    dataset.forEach(emp => {
                        // On ne prend que les temporaires qui sont 'actifs' ou renvoyés PENDANT ce mois (donc pas renvoyés avant)
                        const currentMonthStart = new Date(year, month, 1);
                        if (emp.type === 'temporaire') {
                            let isValid = true;
                            if (emp.statut === 'renvoye' && emp.dateRenvoi) {
                                if (new Date(emp.dateRenvoi) < currentMonthStart) isValid = false;
                            }

                            if (isValid) {
                                tempTotal++;
                                // Vérifier s'il a au moins un pointage présent (1) ou justifié (3)
                                let hasWorked = false;
                                for (let d = 1; d <= daysInM; d++) {
                                    const key = `${emp.id}_${year}-${month}-${d}`;
                                    let s = attendance.value[key];
                                    if (s === undefined) s = 3; // Default temp logic

                                    if (s === 1 || s === 3) { // Présent ou Justifié
                                        // Pour le graph d'activité, on considère qu'un "Justifié par défaut" n'est PAS actif s'il n'a jamais été marqué présent (1).
                                        // MAIS si on suit la logique stricte "Activité", Justifié = a un contrat mais pas là. 
                                        // Pour simplifier : si statut est 1 (Présent) au moins une fois
                                        if (s === 1) {
                                            hasWorked = true;
                                            break;
                                        }
                                    }
                                }
                                if (hasWorked) tempActive++;
                            }
                        }
                    });

                    const tempInactive = tempTotal - tempActive;

                    const labels = Object.keys(siteStats);
                    const countData = labels.map(l => siteStats[l].count);
                    const costData = labels.map(l => siteStats[l].salaryCost);

                    const bgColors = [
                        '#14522D', '#f59e0b', '#10b981', '#3b82f6', '#6366f1', '#8b5cf6'
                    ];

                    nextTick(() => {
                        if (pieChartEl.value) {
                            if (pieChartInstance) pieChartInstance.destroy();
                            pieChartInstance = new Chart(pieChartEl.value, {
                                type: 'doughnut',
                                data: {
                                    labels: labels,
                                    datasets: [{
                                        data: countData,
                                        backgroundColor: bgColors,
                                        borderWidth: 0
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: {
                                            position: 'right'
                                        }
                                    }
                                }
                            });
                        }

                        if (barChartEl.value) {
                            if (barChartInstance) barChartInstance.destroy();
                            barChartInstance = new Chart(barChartEl.value, {
                                type: 'bar',
                                data: {
                                    labels: labels,
                                    datasets: [{
                                        label: 'Masse Salariale (FCFA)',
                                        data: costData,
                                        backgroundColor: '#14522D',
                                        borderRadius: 4
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    scales: {
                                        y: {
                                            beginAtZero: true
                                        }
                                    }
                                }
                            });
                        }

                        // NOUVEAU CHART
                        if (tempChartEl.value) {
                            if (tempChartInstance) tempChartInstance.destroy();
                            // S'il n'y a aucun temporaire, on affiche un graph vide pour éviter les erreurs ou un message
                            const dataTemp = tempTotal > 0 ? [tempActive, tempInactive] : [0, 0];

                            tempChartInstance = new Chart(tempChartEl.value, {
                                type: 'doughnut',
                                data: {
                                    labels: ['Actifs (Présents)', 'Inactifs / En attente'],
                                    datasets: [{
                                        data: dataTemp,
                                        backgroundColor: ['#9333ea', '#e5e7eb'], // Purple for Active, Gray for Inactive
                                        borderWidth: 0
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: {
                                            position: 'bottom'
                                        },
                                        title: {
                                            display: true,
                                            text: tempTotal > 0 ? `${Math.round((tempActive / tempTotal) * 100)}% Actifs` : 'Aucun Temporaire'
                                        }
                                    }
                                }
                            });
                        }
                    });
                };

                watch([filteredEmployees, payrollData, currentTab, filters], () => {
                    if (currentTab.value === 'dashboard') {
                        setTimeout(updateCharts, 100);
                    }
                }, {
                    deep: true
                });

                // Note: loadUsers is declared later in setup(); the watch callback runs
                // after the entire setup() has executed, so loadUsers will be in scope.
                // Using nextTick to guarantee the function is available at runtime.
                watch(currentTab, (newTab) => {
                    if (newTab === 'comptes') {
                        Vue.nextTick(() => {
                            if (typeof loadUsers === 'function') loadUsers();
                        });
                    }
                });


                // --- IMPORT EXCEL/CSV ROBUSTE ---
                const importEmployeesFile = (event) => {
                    if (currentUser.value && currentUser.value.role === 'lecteur') {
                        showToast("Accès en lecture seule : opération non autorisée.", "error");
                        event.target.value = '';
                        return;
                    }
                    if (!importTargetSite.value) {
                        alert("Veuillez d'abord sélectionner le site cible pour ces employés.");
                        event.target.value = '';
                        return;
                    }
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, {
                                type: 'array'
                            });
                            const sheetName = workbook.SheetNames[0];
                            const worksheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(worksheet, {
                                header: 1
                            });

                            if (rows.length > 0) {
                                let headerIndex = -1;
                                for (let i = 0; i < Math.min(15, rows.length); i++) {
                                    const rowStr = rows[i].join(' ').toLowerCase();
                                    if (rowStr.includes('nom') || rowStr.includes('noms')) {
                                        headerIndex = i;
                                        break;
                                    }
                                }
                                if (headerIndex === -1) throw new Error("Impossible de trouver la ligne des titres (Nom, Prénom...)");

                                const headers = rows[headerIndex].map(h => String(h).trim().toLowerCase());
                                const colNomIndex = headers.findIndex(h => h.includes('nom'));
                                const colSalaireIndex = headers.findIndex(h => h.includes('salaire'));
                                const colContactIndex = headers.findIndex(h => (
                                    h.includes('contact') || h.includes('tel') || h.includes('telephone') || h.includes('phone') || h.includes('email') || h.includes('mail')
                                ));

                                const maxId = employees.value.length > 0 ? Math.max(0, ...employees.value.map(e => Number(e.id) || 0)) : 0;
                                let newId = maxId + 1;
                                let addedCount = 0;
                                let skippedDuplicates = 0;

                                for (let i = headerIndex + 1; i < rows.length; i++) {
                                    const row = rows[i];
                                    if (!row || row.length === 0) continue;
                                    let rawName = colNomIndex > -1 ? row[colNomIndex] : null;
                                    if (!rawName || typeof rawName !== 'string' || rawName.trim() === '') continue;
                                    if (rawName.toLowerCase().includes('total')) continue;

                                    rawName = rawName.trim();
                                    let nom = rawName;
                                    let prenom = '';

                                    const spaceIdx = rawName.indexOf(' ');
                                    if (spaceIdx > 0) {
                                        nom = rawName.substring(0, spaceIdx).toUpperCase();
                                        prenom = rawName.substring(spaceIdx + 1).trim();
                                        prenom = prenom.charAt(0).toUpperCase() + prenom.slice(1).toLowerCase();
                                    }

                                        continue;

                                    let contactVal = '';

                                        if (typeof s === 'string') s = s.replace(/[^0-9]/g, '');

                                    }

                                        id: newId++,
                                        nom: nom,
                                        prenom: prenom,
                                        site: importTargetSite.value,

                                        contact: contactVal,
                                        statut: 'actif',
                                        dateRenvoi: null,
                                        dateEmbauche: null
                                    });

                                }
                                if (addedCount > 0) showToast(`${addedCount} importés. ${skippedDuplicates} ignorés.`);
                                else alert("Aucun nouvel employé importé.");
                            }
                        } catch (err) {

                        }
                        event.target.value = '';

                // --- Backup Scheduler (minimal client-side) ---
                function loadBackupSchedule() {
                    return dbGetItem(BACKUP_SCHEDULE_KEY).then(raw => {
                        if (!raw) return null;
                        try { return JSON.parse(raw); } catch (e) { console.warn('[index-sched] failed to parse backup schedule', e); return null; }
                    }).catch(err => { console.warn('[index-sched] db error', err); return null; });
                }

                function mostRecentOccurrenceForSchedule(schedule, now) {
                    if (!schedule || !schedule.enabled) return null;
                    const day = Number(schedule.day);
                    const time = (schedule.time || '00:00').split(':');
                    const hour = Number(time[0] || 0);
                    const minute = Number(time[1] || 0);

                    // Start with this week's occurrence
                    const candidate = new Date(now);
                    // Set to the scheduled day of this week
                    const diff = day - candidate.getDay();
                    candidate.setDate(candidate.getDate() + diff);
                    candidate.setHours(hour, minute, 0, 0);

                    // If candidate is in the future relative to now, step back 7 days
                    if (candidate > now) {
                        candidate.setDate(candidate.getDate() - 7);
                    }
                    return candidate;
                }

                async function checkAndTriggerBackup() {
                    try {
                        const now = new Date();
                        const schedule = loadBackupSchedule();
                        if (!schedule || !schedule.enabled) return;

                        const candidate = mostRecentOccurrenceForSchedule(schedule, now);
                        if (!candidate) return;

                        const lastIso = await dbGetItem(LAST_BACKUP_KEY);
                        const last = lastIso ? new Date(lastIso) : null;

                        // If last backup is after candidate, nothing to do
                        if (last && last >= candidate) return;

                        const minutesSince = Math.floor((now - candidate) / 60000);
                        console.log('[index-sched] schedule candidate:', candidate.toISOString(), 'minutesSince=', minutesSince, 'lastBackup=', lastIso);

                        // Avoid showing reminder repeatedly for same scheduled slot in this tab
                        const promptKey = 'index_backup_prompt_' + candidate.toISOString();
                        const alreadyPrompted = sessionStorage.getItem(promptKey);

                        // Also check if the authoritative tab already recorded that a prompt was shown
                        const stockPromptKey = 'stock_expert_backup_prompt_shown_' + candidate.toISOString().slice(0, 10);
                        const stockPromptRecorded = !!(await dbGetItem(stockPromptKey));

                        if (minutesSince < 60) {
                            // If this tab hasn't shown a prompt yet, show it even if the stock tab recorded the prompt
                            if (!alreadyPrompted) {
                                sessionStorage.setItem(promptKey, '1');
                                // Mark prompt recorded globally so other tabs know
                                dbSetItem(stockPromptKey, '1').catch(err => console.error('Dexie error:', err));
                                // Broadcast reminder so other tabs know (helps newly-opened tabs)
                                try {
                                    if ('BroadcastChannel' in window) {
                                        const bc = new BroadcastChannel('stock_expert_sync');
                                        bc.postMessage({
                                            type: 'backup-reminder',
                                            message: 'Rappel: pensez à sauvegarder votre application (RH).'
                                        });
                                        try {
                                            bc.close();
                                        } catch (e) { }
                                    }
                                } catch (e) { }

                                // Show banner locally. This ensures tabs that missed the original broadcast still display the reminder.
                                showBackupBanner('Rappel: pensez à sauvegarder votre application (RH).', () => {
                                    // user clicked save -> ask authoritative tab to perform backup
                                    try {
                                        if ('BroadcastChannel' in window) {
                                            const bcReq = new BroadcastChannel('stock_expert_sync');
                                            bcReq.postMessage({
                                                type: 'backup-request'
                                            });
                                            try {
                                                bcReq.close();
                                            } catch (e) { }
                                        }
                                    } catch (e) {
                                        console.warn('[index-sched] error sending backup-request', e);
                                    }
                                    removeBackupBanner();
                                });
                            }

                            // It's been 60+ minutes since scheduled time and no backup -> request backup automatically

                                }
                            } catch (e) {
                                console.warn('[index-sched] auto backup request failed', e);
                            }
                        }
                    } catch (e) {
                        console.warn('[index-sched] checkAndTriggerBackup error', e);
                    }

                            const retenueAbsence = Math.round((emp.salaireBase / joursOuvrables) * absentCount);
                            const net = Math.round(emp.salaireBase + (extras.prime || 0) - (extras.dette || 0) - (extras.retenue || 0) - retenueAbsence);

                            historyItems.value.push({
                                monthName: months[m],
                                presentDays: presentCount,
                                absentDays: absentCount,
                                netPay: net > 0 ? net : 0
                            });

                const saveEmployee = () => {

                                employees.value.forEach(emp => { if (emp.id) localSalaries[emp.id] = emp.salaireBase; });

                    function handleResize() {

                            document.body.style.overflow = 'auto';
