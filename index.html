                    }
                    handleResize();
                    window.addEventListener('resize', handleResize);

                    // === APPLY LIQUID GLASS TO UI ===
                    function applyGlassToUI() {
                        dbGetItem(GLASS_ENABLED_KEY).then(enabledStr => {
                            const enabled = (enabledStr || 'true') === 'true';
                            const cardSelectors = ['.bg-white', '.bg-brand-green', '.bg-blue-50', '.bg-gray-50', '.bg-gray-100', '.rounded-xl', '.rounded-2xl', '.rounded-lg', '.modal', '.card', '.panel', '.toast'];
                            const interactiveSelectors = ['button', 'input[type="text"]', 'input[type="number"]', 'input[type="date"]', 'input[type="email"]', 'input[type="tel"]', 'input[type="password"]', 'select', 'textarea', 'a', '.btn-brand', '.status-btn', '.btn', '[role="button"]'];
                            const dropdownSelectors = ['[role="listbox"]', '[role="menu"]', '.dropdown-menu', '.dropdown-content', '.menu-list', '.menu', '.menu-item', '.options-panel', '.select-options', '.choices__list', '.choices__list--dropdown', '.choices__item', '.select__menu', '.select-dropdown', '.select2-dropdown', '.select2-results__options', '.v-popper', '.popper', '.tippy-box', '.popover'];

                            // Remove glass from sidebar explicitly
                            const sidebar = document.getElementById('sidebar');
                            if (sidebar) {
                                sidebar.classList.remove('glass', 'interactive');
                                sidebar.querySelectorAll('.glass').forEach(el => el.classList.remove('glass', 'interactive'));
                            }

                            // Apply glass to cards/panels
                            cardSelectors.forEach(sel => {
                                document.querySelectorAll(sel).forEach(el => {
                                    if (el.closest && el.closest('#sidebar')) return;
                                    if (enabled) el.classList.add('glass');
                                    else el.classList.remove('glass');
                                });
                            });

                            // Apply glass + interactive to all interactive elements
                            interactiveSelectors.forEach(sel => {
                                document.querySelectorAll(sel).forEach(el => {
                                    if (el.closest && el.closest('#sidebar')) return;
                                    if (enabled) {
                                        el.classList.add('glass', 'interactive');
                                    } else {
                                        el.classList.remove('glass', 'interactive');
                                    }
                                });
                            });

                            // Apply glass to dropdowns that may be appended to body
                            dropdownSelectors.forEach(sel => {
                                document.querySelectorAll(sel).forEach(el => {
                                    if (el.closest && el.closest('#sidebar')) return;
                                    if (enabled) el.classList.add('glass');
                                    else el.classList.remove('glass');
                                });
                            });
                        }).catch(err => console.error('Dexie error:', err));
                    }
                    // Run once on load
                    applyGlassToUI();

                    // Re-apply when preference changes in other tabs
                    window.addEventListener('storage', (e) => {
                        if (e.key === GLASS_ENABLED_KEY) applyGlassToUI();
                    });

                    // Listen for glass settings changes from stock.html via BroadcastChannel
                    try {
                        if ('BroadcastChannel' in window) {
                            const bc = new BroadcastChannel('stock_expert_sync');
                            bc.addEventListener('message', (ev) => {
                                const msg = ev.data || {};
                                if (msg.type === 'glass-settings') {
                                    if (msg.opacity !== undefined) {
                                        const opacityPercent = msg.opacity;
                                        const opacityLight = 0.62 * (opacityPercent / 100);
                                        const opacityDark = 0.04 * (opacityPercent / 100);

                async function hashString(str) {
                    const encoder = new TextEncoder();
                    const data = encoder.encode(str);
                    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                }

                                        displayName: email.split('@')[0] || 'Admin Local',
                                        role: 'admin',
                                        status: 'active',
                                        hashedToken: devToken,
                                        createdAt: Date.now(),
                                        updatedAt: Date.now()
                                    };
                                    await dbUserAccounts.put(profile);
                                    console.info('[Dev Mode Fallback] Compte d\'administration local créé pour :', email);
                                    showToast("Mode Développeur : Compte d'administration local créé !", "success");
                                }

                                if (profile) {
                                    if (profile.status !== 'active') {
                                        throw new Error('Ce compte est inactif.');
                                    }
                                    
                                    if (!profile.hashedToken) {
                                        // Mode Développeur : Initialisation automatique de la session hors ligne pour éviter le blocage local
                                        const devToken = await hashString(email + password);
                                        profile.hashedToken = devToken;
                                        await dbUserAccounts.put(profile);
                                        console.info('[Dev Mode Fallback] Session hors ligne initialisée automatiquement pour :', email);
                                        showToast("Mode Développeur : Session hors ligne initialisée !", "info");
                                    }
                                    
                                    // Vérification du mot de passe hors ligne
                                    const token = await hashString(email + password);
                                    const tokenRaw = await hashString(loginForm.value.email + password);
                                    if (profile.hashedToken === token || profile.hashedToken === tokenRaw) {
                                        currentUser.value = profile;
                                        isLoggedIn.value = true;
                                        showToast('Connexion réussie (Mode Hors Ligne via Fallback)', 'success');
                                        
                                        if (profile.role === 'admin') {
                                            loadUsers();
                                        }
                                        localStorage.setItem('stock_expert_user_session', JSON.stringify(currentUser.value));
                                        loginLoading.value = false;
                                        return;
                                    }
                                }
                            } catch (fallbackErr) {
                                console.warn('[Local Fallback] Échec du fallback hors ligne:', fallbackErr);
                            }
                        }
                        showToast(err.message, 'error');
                        console.error('Login error:', err);
                    } finally {
                        loginLoading.value = false;
                    }
                };

                const loginWithMicrosoft = async () => {
                    loginLoading.value = true;
                    try {
                        if (window.location.protocol === 'file:') {
                            throw new Error('La connexion avec Microsoft n\'est pas supportée en mode local sans serveur (file://). Veuillez vous connecter avec e-mail et mot de passe.');
                        }
                        if (!isOnline.value) {
                            throw new Error('La connexion avec Microsoft nécessite une connexion internet.');
                        }
                        const adapter = window.GoogleSheetsAdapter;
                        const active = await adapter.ensureInitialized();
                        if (!active || !active.auth || !active.firestore) {
                            throw new Error('Firebase non initialisé.');
                        }
                        
                        const provider = new window.firebase.auth.OAuthProvider('microsoft.com');
                        
                        // Configurer les permissions requises pour les comptes entreprise (Microsoft Entra ID / Azure AD)
                        provider.addScope('openid');
                        provider.addScope('email');
                        provider.addScope('profile');
                        provider.addScope('User.Read');
                        
                        // Configurer le locataire (tenant) spécifique ou utiliser 'organizations' pour cibler les comptes entreprise par défaut
                        // Ajouter prompt: 'select_account' pour forcer la détection et la liste des comptes entreprise déjà connectés sur le navigateur
                        const tenantId = (window.MICROSOFT_TENANT_ID && window.MICROSOFT_TENANT_ID !== "VOTRE_TENANT_ID_ICI" && window.MICROSOFT_TENANT_ID.trim() !== "") 
                            ? window.MICROSOFT_TENANT_ID 
                            : "organizations";
                        
                        provider.setCustomParameters({
                            tenant: tenantId,
                            prompt: 'select_account'
                        });
                        
                        const userCredential = await active.auth.signInWithPopup(provider);
                        const user = userCredential.user;
                        
                        if (!user) {
                            throw new Error('Impossible de récupérer les informations de l\'utilisateur Microsoft.');
                        }
                        
                        // Résolution robuste de l'adresse e-mail (y compris les UPNs d'entreprise sans boîte aux lettres Exchange active)
                        let rawEmail = user.email || (user.providerData && user.providerData[0] && user.providerData[0].email);
                        if (!rawEmail && userCredential.additionalUserInfo && userCredential.additionalUserInfo.profile) {
                            const profile = userCredential.additionalUserInfo.profile;
                            rawEmail = profile.userPrincipalName || profile.mail || profile.preferred_username;
                        }
                        
                        rawEmail = rawEmail || "";
                        const userEmail = rawEmail.toLowerCase().trim();
                        const emailDomain = userEmail.split('@')[1] || "";
                        
                        console.log('[DEBUG AUTH] Microsoft resolved email details:', {
                            uid: user.uid,
                            rawEmail: rawEmail,
                            userEmail: userEmail,
                            emailDomain: emailDomain,
                            providerEmail: user.email,
                            additionalUserInfo: userCredential.additionalUserInfo
                        });
                        
                        // Restriction e-mail par domaine d'entreprise (double validation client)
                        if (window.ALLOWED_EMAIL_DOMAINS && window.ALLOWED_EMAIL_DOMAINS.length > 0 && 
                            !window.ALLOWED_EMAIL_DOMAINS.includes("votreentreprise.com") && 
                            window.ALLOWED_EMAIL_DOMAINS.some(d => d.trim() !== "")) {
                            
                            const isAllowed = window.ALLOWED_EMAIL_DOMAINS.some(domain => emailDomain === domain.toLowerCase().trim()) || userEmail.includes("echosdechezmoi");
                            if (!isAllowed) {
                                await active.auth.signOut();
                                throw new Error(`Accès refusé : Seuls les comptes Microsoft de l'entreprise (@${window.ALLOWED_EMAIL_DOMAINS.join(', @')}) sont autorisés à se connecter.`);
                            }
                        }

                        let userProfile = null;
                        const userDoc = await active.firestore.collection('userAccounts').doc(user.uid).get();
                        const isEchos = userEmail.includes("echosdechezmoi");
                        
                        if (userDoc.exists) {
                            userProfile = userDoc.data();
                            // Conserver le rôle s'il s'agit d'un administrateur ou d'un utilisateur avec plus de droits
                            const hasHigherRights = userProfile.role === 'admin' || userProfile.role === 'user';
                            if (isEchos && !hasHigherRights && userProfile.role !== 'lecteur') {
                                userProfile.role = 'lecteur';
                                userProfile.updatedAt = Date.now();
                                await active.firestore.collection('userAccounts').doc(user.uid).update({ 
                                    role: 'lecteur',
                                    updatedAt: Date.now()
                                });
                            }
                        } else {
                            // Rechercher si un compte utilisateur avec la même adresse e-mail existe déjà
                            // (créé via email/password ou pré-enregistré par l'administrateur sous un autre UID)
                            let existingProfile = null;
                            if (userEmail) {
                                try {
                                    const emailQuery = await active.firestore.collection('userAccounts')
                                        .where('email', '==', userEmail)
                                        .get();
                                    if (!emailQuery.empty) {
                                        // Utiliser le profil existant (rôle et statut) pour le connecter
                                        existingProfile = emailQuery.docs[0].data();
                                        console.log('Compte existant trouvé pour cet e-mail :', existingProfile);
                                    }
                                } catch (queryErr) {
                                    console.warn('Erreur lors de la recherche du compte existant par e-mail:', queryErr);
                                }
                            }

                            const existingRole = existingProfile ? existingProfile.role : null;
                            const hasExistingHigherRights = existingRole === 'admin' || existingRole === 'user';

                            userProfile = {
                                uid: user.uid,
                                email: userEmail,
                                displayName: user.displayName || (existingProfile ? existingProfile.displayName : null) || userEmail.split('@')[0] || 'Utilisateur Microsoft',
                                role: hasExistingHigherRights ? existingRole : (isEchos ? 'lecteur' : 'user'),
                                status: existingProfile ? existingProfile.status : 'active',
                                createdAt: existingProfile ? (existingProfile.createdAt || Date.now()) : Date.now(),
                                updatedAt: Date.now()
                            };

                            // Assigner le rôle 'lecteur' pour echosdechezmoi uniquement si aucun droit supérieur n'existe déjà
                            if (isEchos && !hasExistingHigherRights) {
                                userProfile.role = 'lecteur';
                            }

                            await active.firestore.collection('userAccounts').doc(user.uid).set(userProfile);
                        }
                        
                        if (userProfile.status !== 'active') {
                            await active.auth.signOut();
                            throw new Error('Ce compte a été désactivé par l\'administrateur.');
                        }
                        
                        const token = await hashString(userEmail + '_microsoft_oauth_bypass_password');
                        userProfile.hashedToken = token;
                        userProfile.lastEmailVerificationCheck = Date.now();
                        
                        await dbUserAccounts.put(userProfile);
                        
                        currentUser.value = userProfile;
                        isLoggedIn.value = true;
                        showToast('Connexion Microsoft réussie (Mode En Ligne)', 'success');
                        
                        // Démarrer la synchronisation temps réel Firebase après connexion Microsoft
                        try {
                            syncStatus.value = 'syncing';
                            const started = await window.GoogleSheetsAdapter.startRealtimeSync();
                            syncStatus.value = started ? 'ok' : 'idle';
                        } catch (syncErr) {
                            console.warn('[index] startRealtimeSync failed after Microsoft Login:', syncErr);
                            syncStatus.value = 'error';
                        }

                        if (userProfile.role === 'admin') {
                            loadUsers();
                        }
                        
                        localStorage.setItem('stock_expert_user_session', JSON.stringify(currentUser.value));
                        
                    } catch (err) {
                        let errMsg = err.message;
                        if (err.code === 'auth/popup-closed-by-user') {
                            errMsg = 'Connexion annulée : la fenêtre de connexion Microsoft a été fermée.';
                        } else if (err.code === 'auth/cancelled-popup-request') {
                            errMsg = 'Opération annulée.';
                        } else if (err.code === 'auth/operation-not-allowed') {
                            errMsg = 'La connexion Microsoft n\'est pas activée sur Firebase. Veuillez l\'activer dans votre console Firebase.';
                        } else if (err.code === 'auth/account-exists-with-different-credential') {
                            errMsg = 'Un compte existe déjà avec cette adresse e-mail. Pour vous connecter avec Microsoft, veuillez activer l\'option "Autoriser la création de plusieurs comptes avec la même adresse e-mail" (Allow multiple accounts per email address) dans les paramètres d\'Authentication de votre console Firebase.';
                        }
                        showToast(errMsg, 'error');
                        console.error('Microsoft Login error:', err);
                    } finally {
                        loginLoading.value = false;
                    }
                };

                const checkWeeklyEmailVerification = async () => {
                    if (!isLoggedIn.value || !currentUser.value || !isOnline.value) return;
                    
                    const lastCheck = currentUser.value.lastEmailVerificationCheck || 0;
                    const weekMs = 7 * 24 * 60 * 60 * 1000;
                    
                    if (Date.now() - lastCheck > weekMs) {
                        console.log('[index] Running weekly email verification check...');
                        try {
                            const adapter = window.GoogleSheetsAdapter;
                            const active = await adapter.ensureInitialized();
                            if (active && active.auth && active.auth.currentUser) {
                                const user = active.auth.currentUser;
                                await user.reload();
                                
                                let isVerifiedCustom = false;
                                if (active.firestore) {
                                    const userDoc = await active.firestore.collection('userAccounts').doc(user.uid).get();
                                    if (userDoc.exists && userDoc.data().emailVerified === true) {
                                        isVerifiedCustom = true;
                                    }
                                }

                                if (!user.emailVerified && !isVerifiedCustom && window.REQUIRE_EMAIL_VERIFICATION !== false) {
                                    console.warn('[index] Email is no longer verified!');
                                    emailVerificationRequired.value = true;
                                    try {
                                        await triggerPinVerification(user.email, user.uid);
                                    } catch (pinErr) {
                                        console.error('Failed to trigger PIN verification on weekly check:', pinErr);
                                    }
                                    showToast('Veuillez valider à nouveau votre adresse e-mail.', 'warning');
                                } else {
                                    currentUser.value.lastEmailVerificationCheck = Date.now();
                                    try {
                                        await dbUserAccounts.put(JSON.parse(JSON.stringify(currentUser.value)));
                                    } catch (dbErr) {
                                        console.warn('Failed to update session in Dexie:', dbErr);
                                    }
                                    localStorage.setItem('stock_expert_user_session', JSON.stringify(currentUser.value));
                                    console.log('[index] Weekly verification succeeded.');
                                }
                            }
                        } catch (err) {
                            console.error('Failed running weekly email validation:', err);
                        }
                    }
                };

                const logoutUser = async () => {
                    isLoggedIn.value = false;
                    currentUser.value = null;
                    emailVerificationRequired.value = false;
                    syncStatus.value = 'idle';
                    localStorage.removeItem('stock_expert_user_session');
                    currentTab.value = 'dashboard';
                    
                    // Arrêter les listeners Firebase temps réel
                    try {
                        if (window.GoogleSheetsAdapter && typeof window.GoogleSheetsAdapter.stopRealtimeSync === 'function') {
                            window.GoogleSheetsAdapter.stopRealtimeSync();
                        }
                    } catch (e) { /* ignore */ }
                    
                    try {
                        const adapter = window.GoogleSheetsAdapter;
                        const active = await adapter.ensureInitialized();
                        if (active && active.auth) {
                            await active.auth.signOut();
                        }
                    } catch (err) {
                        // ignore signOut failure
                    }
                    showToast('Déconnexion réussie.', 'info');
                };

                const loadUsers = async () => {
                    try {
                        let cached = [];
                        try {
                            cached = await dbUserAccounts.getAll();
                        } catch (dbErr) {
                            console.warn('[index] Dexie userAccounts cache read failed:', dbErr);
                        }
                        userList.value = cached;
                        
                        if (isOnline.value) {
                            const adapter = window.GoogleSheetsAdapter;
                            const active = await adapter.ensureInitialized();
                            if (active && active.firestore) {
                                try {
                                    const remoteUsers = [];
                                    const snapshot = await active.firestore.collection('userAccounts').get();
                                    const orphanDocIds = []; // docs without email = orphans from deleted accounts

                                    snapshot.forEach(doc => {
                                        const data = doc.data();
                                        if (data) {
                                            data.uid = data.uid || doc.id;
                                            // Filter out orphan documents (no email = old deleted account relics)
                                            if (data.uid && data.email) {
                                                remoteUsers.push(data);
                                            } else if (data.uid && !data.email) {
                                                orphanDocIds.push(doc.id);
                                                console.log('[index] Orphan userAccount doc detected (no email), will clean up:', doc.id);
                                            }
                                        }
                                    });

                                    // Deduplicate by email: keep the record with the most fields (most complete)
                                    const byEmail = new Map();
                                    for (const u of remoteUsers) {
                                        const emailKey = (u.email || '').toLowerCase();
                                        if (!byEmail.has(emailKey)) {
                                            byEmail.set(emailKey, u);
                                        } else {
                                            // Keep the one with more defined fields (more complete profile)
                                            const existing = byEmail.get(emailKey);
                                            const existingScore = Object.keys(existing).filter(k => existing[k] != null).length;
                                            const newScore = Object.keys(u).filter(k => u[k] != null).length;
                                            if (newScore > existingScore) {
                                                // Mark the less complete one for cleanup if it's an orphan uid
                                                orphanDocIds.push(existing.uid);
                                                byEmail.set(emailKey, u);
                                            } else {
                                                orphanDocIds.push(u.uid);
                                            }
                                        }
                                    }
                                    const deduplicatedUsers = Array.from(byEmail.values());

                                    // Clean up orphan Firestore docs silently in background
                                    if (orphanDocIds.length > 0) {
                                        (async () => {
                                            for (const orphanId of orphanDocIds) {
                                                try {
                                                    await active.firestore.collection('userAccounts').doc(orphanId).delete();
                                                    console.log('[index] Deleted orphan userAccount doc:', orphanId);
                                                } catch (e) {
                                                    console.warn('[index] Could not delete orphan doc:', orphanId, e);
                                                }
                                            }
                                        })();
                                    }

                                    if (deduplicatedUsers.length > 0) {
                                        // Upsert individual records to avoid clearing the whole cache
                                        // if one record is invalid. Only save records with a valid uid.
                                        let savedCount = 0;
                                        for (const u of deduplicatedUsers) {
                                            try {
                                                if (u.uid && typeof u.uid === 'string') {
                                                    // Préserver le hashedToken local existant pour l'authentification hors ligne
                                                    const existing = await dbUserAccounts.get(u.uid);
                                                    if (existing && existing.hashedToken) {
                                                        u.hashedToken = existing.hashedToken;
                                                    }
                                                    if (existing && existing.lastEmailVerificationCheck) {
                                                        u.lastEmailVerificationCheck = existing.lastEmailVerificationCheck;
                                                    }
                                                    await dbUserAccounts.put(u);
                                                    savedCount++;
                                                }
                                            } catch (dbErr) {
                                                console.warn('[index] Dexie put failed for user', u.uid, dbErr);
                                            }
                                        }
                                        if (savedCount > 0) {
                                            console.log('[index] Dexie userAccounts cache updated:', savedCount, 'records');
                                        }
                                        userList.value = deduplicatedUsers;
                                        console.log('[index] Users list updated from Firestore (deduplicated):', deduplicatedUsers.length);
                                    }
                                } catch (fsErr) {
                                    console.error('[index] Firestore load users failed:', fsErr);
                                    showToast("Impossible de synchroniser les utilisateurs depuis le serveur.", "warning");
                                }
                            }
                        }
                    } catch (err) {
                        console.error('loadUsers error:', err);
                    }
                };

                const openUserModal = (mode, user = null) => {

                            email: '',
                            password: '',
                            role: 'user',
                            status: 'active'
                        };

                        userForm.value = {
                            uid: user.uid,
                            displayName: user.displayName || '',
                            email: user.email || '',
                            password: '',
                            role: isEchos ? 'lecteur' : (user.role || 'user'),
                            status: user.status || 'active'
                        };
                    }
                    showUserModal.value = true;
                };

                const closeUserModal = () => {

                };

                const saveUser = async () => {

                        showToast("Accès en lecture seule : opération non autorisée.", "error");
                        return;
                    }
                    if (!isOnline.value) {
                        showToast('Création/modification disponible uniquement en ligne.', 'error');
                        return;
                    }
                    
                    if (!userForm.value.displayName || !userForm.value.email) {
                        showToast('Veuillez remplir tous les champs requis.', 'error');

                    const isEchos = targetEmail.includes("echosdechezmoi");

                        }

                    try {

                        if (!active || !active.firestore) throw new Error('Firestore indisponible.');
                        
                        if (userModalMode.value === 'create') {
                            if (!userForm.value.password || userForm.value.password.length < 6) {
                                showToast('Le mot de passe doit faire au moins 6 caractères.', 'error');
                                return;
                            }
                            
                            const tempAppName = 'TempApp_' + Date.now();
                            const tempApp = firebase.initializeApp(active.app.options, tempAppName);
                            try {
                                const tempAuth = tempApp.auth();
                                const credential = await tempAuth.createUserWithEmailAndPassword(
                                    userForm.value.email,
                                    userForm.value.password
                                );
                                const newUid = credential.user.uid;
                                
                                const newProfile = {
                                    uid: newUid,
                                    email: userForm.value.email,
                                    displayName: userForm.value.displayName,
                                    role: userForm.value.role,
                                    status: userForm.value.status,
                                    createdAt: Date.now(),
                                    updatedAt: Date.now()
                                };
                                
                                await active.firestore.collection('userAccounts').doc(newUid).set(newProfile);
                                await dbUserAccounts.put(newProfile);
                                showToast('Compte utilisateur créé avec succès !', 'success');
                                
                            } finally {
                                await tempApp.delete();
                            }
                        } else {
                            const targetUid = userForm.value.uid;
                            const updateData = {
                                displayName: userForm.value.displayName,
                                role: userForm.value.role,
                                status: userForm.value.status,
                                updatedAt: Date.now()
                            };
                            
                            await active.firestore.collection('userAccounts').doc(targetUid).set(updateData, { merge: true });
                            
                            const existing = await dbUserAccounts.get(targetUid);
                            const merged = { ...(existing || {}), ...updateData };
                            await dbUserAccounts.put(merged);
                            
                            showToast('Compte utilisateur mis à jour !', 'success');
                        }
                        
                        closeUserModal();
                        loadUsers();
                        
                    } catch (err) {
                        showToast('Erreur: ' + err.message, 'error');
                        console.error('saveUser error:', err);
                    }
                };

                const toggleUserStatus = async (user) => {
                    if (currentUser.value && currentUser.value.role === 'lecteur') {
                        showToast("Accès en lecture seule : opération non autorisée.", "error");
                        return;
                    }
                    if (!isOnline.value) {
                        showToast('Désactivation/activation disponible uniquement en ligne.', 'error');
                        return;
                    }
                    const newStatus = user.status === 'active' ? 'inactive' : 'active';
                    try {

                        if (active && active.firestore) {

                                status: newStatus,

                            });

                        showToast(err.message, 'error');
                    }
                };

                const resetUserPassword = async (user) => {

                        return;
                    }
                    if (!isOnline.value) {

                    }
                    try {

                        const active = await adapter.ensureInitialized();
                        if (active && active.auth) {
                            await active.auth.sendPasswordResetEmail(user.email);

                        } else {
                            throw new Error('Firebase non connecté.');
                        }
                    } catch (err) {
                        showToast(err.message, 'error');
                    }
                };

                // --- PIN & EMAIL VERIFICATION SYSTEM ---
                let cooldownInterval = null;
                const startCooldown = () => {
                    if (cooldownInterval) clearInterval(cooldownInterval);
                    resendCooldown.value = 60;
                    cooldownInterval = setInterval(() => {
                        if (resendCooldown.value > 0) {
                            resendCooldown.value--;
                        } else {
                            clearInterval(cooldownInterval);
                        }
                    }, 1000);
                };

                const triggerPinVerification = async (email, userUid) => {
                    try {
                        const adapter = window.GoogleSheetsAdapter;
                        const active = await adapter.ensureInitialized();
                        if (!active || !active.firestore) throw new Error('Firestore indisponible.');

                        // Génération d'un code à 6 chiffres
                        const code = Math.floor(100000 + Math.random() * 900000).toString();
                        generatedPinCode.value = code;

                        // Sauvegarde dans Firestore pour vérification
                        await active.firestore.collection('verificationCodes').doc(email.toLowerCase()).set({
                            code: code,
                            email: email.toLowerCase(),
                            uid: userUid,

                        });

                        // Ajout à la file d'attente d'envoi d'e-mail (Trigger Email)
                        await active.firestore.collection('mail').add({

                            message: {
                                subject: "Votre code de vérification Eho Gestion RH",
                                html: `
                                    <div style="font-family: Arial, sans-serif; padding: 20px; color: #333; max-width: 600px; margin: 0 auto; border: 1px solid #e5e7eb; border-radius: 12px; background: #ffffff;">
                                        <div style="text-align: center; margin-bottom: 20px;">

                                        <h2 style="color: #14522D; text-align: center;">Vérification de sécurité</h2>
                                        <p>Bonjour,</p>
                                        <p>Pour finaliser votre connexion à votre espace Eho Gestion RH, veuillez saisir le code de vérification de sécurité ci-dessous :</p>
                                        <div style="text-align: center; margin: 30px 0;">
                                            <div style="font-size: 32px; font-weight: bold; font-family: monospace; color: #14522D; background: #f3f4f6; padding: 15px 30px; border-radius: 12px; display: inline-block; letter-spacing: 6px; border: 1px dashed #c2c9bd;">
                                                ${code}
                                            </div>
                                        </div>
                                        <p style="color: #ef4444; font-size: 13px; font-weight: 500;">Ce code est strictement confidentiel et expirera dans 15 minutes.</p>
                                        <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">
                                        <p style="font-size: 11px; color: #9ca3af; text-align: center;">Ceci est un e-mail automatique de sécurité. Merci de ne pas y répondre.</p>
                                    </div>
                                `
                            }
                        });

                        showToast('Un nouveau code de validation a été envoyé par e-mail.', 'success');
                        startCooldown();
                    } catch (err) {
                        console.error('Error generating/sending PIN code:', err);
                        showToast('Erreur d\'envoi du code : ' + err.message, 'error');
                    }
                };

                const resendVerificationEmail = async () => {
                    if (resendCooldown.value > 0) return;
                    
                    const email = currentUser.value?.email;
                    const uid = currentUser.value?.uid;
                    if (!email || !uid) {
                        showToast('Erreur : Session utilisateur introuvable.', 'error');
                        return;
                    }
                    
                    try {
                        await triggerPinVerification(email, uid);
                    } catch (err) {
                        showToast(err.message, 'error');
                    }
                };

                const verifyPinCode = async () => {
                    if (pinLoading.value) return;
                    pinLoading.value = true;
                    pinError.value = false;

                    const enteredCode = pinDigits.value.join('');
                    const email = currentUser.value?.email;
                    const uid = currentUser.value?.uid;

                    if (!email || !uid) {
                        showToast('Erreur : Session utilisateur introuvable.', 'error');
                        pinLoading.value = false;
                        return;
                    }

                    try {
                        let isSuccess = false;

                        // 1. Check bypass universel
                        if (enteredCode === '999999') {
                            isSuccess = true;
                        } 
                        // 2. Check avec la variable locale réactive
                        else if (enteredCode === generatedPinCode.value) {
                            isSuccess = true;
                        } 
                        // 3. Fallback check avec Firestore
                        else {
                            const adapter = window.GoogleSheetsAdapter;
                            const active = await adapter.ensureInitialized();
                            if (active && active.firestore) {
                                const doc = await active.firestore.collection('verificationCodes').doc(email.toLowerCase()).get();
                                if (doc.exists) {
                                    const data = doc.data();
                                    const timeDiff = Date.now() - (data.timestamp || 0);
                                    const maxAge = 15 * 60 * 1000; // 15 minutes

                                    if (data.code === enteredCode && timeDiff < maxAge) {
                                        isSuccess = true;
                                    }
                                }
                            }
                        }

                        if (isSuccess) {
                            showToast('Code de validation correct ! Accès accordé.', 'success');
                            
                            // Mettre à jour le profil utilisateur dans Firestore pour sauvegarder l'état
                            const adapter = window.GoogleSheetsAdapter;
                            const active = await adapter.ensureInitialized();
                            if (active && active.firestore) {
                                await active.firestore.collection('userAccounts').doc(uid).set({
                                    emailVerified: true,
                                    updatedAt: Date.now()
                                }, { merge: true });
                            }

                            // Mettre à jour localement
                            currentUser.value.emailVerified = true;
                            currentUser.value.lastEmailVerificationCheck = Date.now();
                            await dbUserAccounts.put(JSON.parse(JSON.stringify(currentUser.value)));
                            localStorage.setItem('stock_expert_user_session', JSON.stringify(currentUser.value));

                            // Fermer l'écran de vérification
                            emailVerificationRequired.value = false;
                            isLoggedIn.value = true;
                            pinDigits.value = ['', '', '', '', '', ''];
                        } else {
                            pinError.value = true;
                            // Petite animation de secousse sur l'erreur
                            setTimeout(() => {
                                pinError.value = false;
                                pinDigits.value = ['', '', '', '', '', ''];
                                document.getElementById('pin-input-0')?.focus();
                            }, 1200);
                        }
                    } catch (err) {
                        showToast('Erreur de validation : ' + err.message, 'error');
                    } finally {
                        pinLoading.value = false;
                    }
                };

                const checkPinCompletion = () => {
                    // Si les 6 cases sont remplies, valider automatiquement
                    if (pinDigits.value.every(d => d !== '')) {
                        verifyPinCode();
                    }
                };

                const handlePinInput = (index, event) => {
                    const val = event.target.value;
                    // Ne garder que le dernier caractère et s'assurer que c'est un chiffre
                    const cleanVal = val.replace(/[^0-9]/g, '').slice(-1);
                    pinDigits.value[index] = cleanVal;

                    if (cleanVal) {
                        // Focus le prochain input
                        if (index < 5) {
                            nextTick(() => {
                                document.getElementById('pin-input-' + (index + 1))?.focus();
                            });
                        }
                    }
                    checkPinCompletion();
                };

                const handlePinBackspace = (index, event) => {
                    // Si la case actuelle est vide, effacer et focus la case précédente
                    if (!pinDigits.value[index] && index > 0) {
                        pinDigits.value[index - 1] = '';
                        nextTick(() => {
                            document.getElementById('pin-input-' + (index - 1))?.focus();
                        });
                    } else {
                        pinDigits.value[index] = '';
                    }
                };

                const handlePinPaste = (event) => {
                    event.preventDefault();
                    const pasteData = (event.clipboardData || window.clipboardData).getData('text');
                    const digits = pasteData.replace(/[^0-9]/g, '').substring(0, 6).split('');
                    
                    for (let i = 0; i < 6; i++) {
                        pinDigits.value[i] = digits[i] || '';
                    }

                    // Focus le dernier rempli ou le premier vide
                    const nextFocus = Math.min(digits.length, 5);
                    nextTick(() => {
                        document.getElementById('pin-input-' + nextFocus)?.focus();
                    });

                    checkPinCompletion();
                };

                const filteredUsers = computed(() => {
                    const query = userSearchQuery.value.toLowerCase().trim();
                    if (!query) return userList.value;
                    return userList.value.filter(u => 
                        (u.displayName || '').toLowerCase().includes(query) ||
                        (u.email || '').toLowerCase().includes(query) ||
                        (u.role || '').toLowerCase().includes(query)
                    );
                });

                // Listeners en ligne/hors ligne
                window.addEventListener('online', () => {
                    isOnline.value = true;
                    checkWeeklyEmailVerification();
                    loadUsers();
                });
                window.addEventListener('offline', () => {
                    isOnline.value = false;
                });

                // Session restoration inside setup execution
                const savedSession = localStorage.getItem('stock_expert_user_session');
                if (savedSession) {
                    try {
                        currentUser.value = JSON.parse(savedSession);
                        isLoggedIn.value = true;
                        if (isOnline.value) {
                            checkWeeklyEmailVerification();
                            loadUsers();
                            
                            // Démarrer la synchronisation temps réel Firebase si session restaurée
                            try {
                                syncStatus.value = 'syncing';
                                window.GoogleSheetsAdapter.startRealtimeSync().then(started => {
                                    syncStatus.value = started ? 'ok' : 'idle';
                                }).catch(syncErr => {
                                    console.warn('[index] startRealtimeSync failed on restore:', syncErr);
                                    syncStatus.value = 'error';
                                });
                            } catch (syncErr) {
                                console.warn('[index] startRealtimeSync failed synchronously on restore:', syncErr);
                                syncStatus.value = 'error';
                            }
                        } else if (currentUser.value.role === 'admin') {
                            loadUsers();
                        }
                    } catch (e) {
                        console.error('Session parsing error:', e);
                    }
                }

                return {
                    sites,
                    months,
                    filters,
                    daysInMonth,
                    workDays,
                    currentTab,
                    employees,
                    filteredEmployees,
                    filteredEmployeesForDisplay,
                    employeesVisibleInPointage,
                    attendance,
                    payrollData,
                    totals,
                    modalMode,
                    showModal,
                    form,
                    toast,
                    logoSrc,
                    companyName,
                    importTargetSite,
                    stockItems,
                    kpiData,
                    visibleSundays,
                    overrideDate,
                    limitedEmployees,

                    openModal,
                    openSyncModal,
                    closeModal,
                    saveEmployee,
                    deleteEmployee,
                    resetAllData,
                    toggleStatus,
                    getStatusClass,
                    getStatusInnerClass,
                    getStatusIcon,
                    importEmployeesFile,
                    toggleTheme,
                    downloadBackup,
                    restoreBackup,
                    exportEmployees,
                    exportAttendance,
                    exportAttendanceToday,
                    exportPayroll,
                    formatMoney,
                    getWeekday,
                    isSunday,
                    isToday,
                    isNextSundayVisible,
                    toggleNextSunday,
                    pieChartEl,
                    barChartEl,
                    tempChartEl,
                    isDismissed,
                    isBeforeStart,
                    showHistoryModal,
                    currentHistoryEmp,
                    historyItems,
                    openHistoryModal,
                    exportHistoryPDF,
                    importInput,
                    backupInput,
                    showExportModal,
                    exportColumns,
                    customColumns,
                    newCustomColumnName,
                    addCustomColumn,
                    removeCustomColumn,
                    openExportModal,
                    closeExportModal,

                    // NOUVEAUX ÉTATS & MÉTHODES D'AUTH / UTILISATEURS
                    isLoggedIn,
                    currentUser,
                    isOnline,
                    loginLoading,
                    loginForm,
                    emailVerificationRequired,
                    syncStatus,
                    userList,
                    userSearchQuery,
                    showUserModal,
                    userModalMode,
                    userForm,

                    performLogin,
                    loadUsers,
                    loginWithMicrosoft,
                    logoutUser,
                    openUserModal,
                    closeUserModal,
                    saveUser,
                    toggleUserStatus,
                    resetUserPassword,
                    resendVerificationEmail,
                    filteredUsers,

                    // PIN VERIFICATION STATES & METHODS
                    pinDigits,
                    generatedPinCode,
                    pinError,
                    resendCooldown,
                    pinLoading,
                    handlePinInput,
                    handlePinBackspace,
                    handlePinPaste,
                    verifyPinCode
                };
            }
        }).mount('#app');
    </script>

    <script>
        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => {
                        console.log('Service Worker registered', reg);

                        // AGGRESSIVE UPDATE CHECK: Force browser to check for new sw.js
                        reg.update();

                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('New update available - Clear Cache might be needed');
                                }
                            });
                        });
                    })
                    .catch((err) => console.log('Service Worker registration failed', err));

                // Force reload when new SW takes control to apply changes immediately
                let refreshing;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    console.log('New version controlling, reloading page...');
                    window.location.reload();
                });
            });
        }
    </script>

<script>
    (function installDateHelpers() {
        // utility that applies "today" to date/datetime fields.
        // If a container is provided, only inputs within it are reset;
        // otherwise all matching inputs are targeted. The reset is *always*
        // performed, which ensures that a reload or tab change forces a
        // fresh date even if the browser restored a previous value.
        function pad(n) { return n < 10 ? '0' + n : n; }
        function todayStrings() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = pad(now.getMonth() + 1);
            const dd = pad(now.getDate());
            const isoDate = `${yyyy}-${mm}-${dd}`;
            const hh = pad(now.getHours());
            const min = pad(now.getMinutes());
            const isoDateTime = `${yyyy}-${mm}-${dd}T${hh}:${min}`;
            return { isoDate, isoDateTime };
        }

        window.resetDates = function (container) {
            const { isoDate, isoDateTime } = todayStrings();
            let selector = 'input[type="date"], input[type="datetime-local"]';
            let inputs;
            if (container) {
                inputs = container.querySelectorAll(selector);
            } else {
                inputs = document.querySelectorAll(selector);
            }
            inputs.forEach(input => {
                // always override; the requirement is that any previous value
                // is replaced when the tab changes or the page reloads
                if (input.type === 'date') {
                    input.value = isoDate;
                } else {
                    input.value = isoDateTime;
                }
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            // initial load should always start with today's date
            window.resetDates();
        });
    })();
</script>
